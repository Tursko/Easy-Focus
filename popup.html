<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="popup.css">
</head>

<body>
    <div class="container">
        <h1 class="title">Easy Focus</h1>

        <button id="enableFocusBtn" class="btn btn-primary">Enable Focus Mode</button>
        <button id="disableFocusBtn" class="btn btn-secondary" style="display:none">Hold to Disable</button>
        <button id="addCurrentSiteBtn" class="btn btn-primary" style="display:none">Add Current Site</button>

        <div id="inputDiv" class="input-row">
            <input id="inputUrl" type="text" placeholder="Add distracting site...">
            <button id="addUrlBtn" class="btn btn-icon">+</button>
        </div>

        <div id="listDiv">
            <h3 class="list-title">Your distracting sites</h3>
            <ul id="ulUrls" class="site-list"></ul>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
